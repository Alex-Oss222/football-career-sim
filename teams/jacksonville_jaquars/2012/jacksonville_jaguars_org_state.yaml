# OFFSEASON OPERATIONAL PRIORITIES

offseason_priorities:
  - priority: Hire Head Coach
    detail: >
      Khan's first and most important decision. The HC defines the franchise direction.
      Interview process is active. Multiple candidates expected. Decision likely by
      late January.
  - priority: Build coaching staff
    detail: >
      Once HC is hired, he must build an entire staff from scratch. OC, DC, STC, all
      position coaches. This must happen quickly — the offseason calendar does not wait.
      Free agency opens in March, the Combine is in late February. The staff must be
      assembled and functional by late February at the latest.
  - priority: Evaluate Gabbert
    detail: >
      The HC and new offensive staff must develop an honest evaluation framework for
      Gabbert. Film study of 2011 season, assessment of his mechanics, decision-making,
      and coachability. This evaluation begins before OTAs and continues through camp.
  - priority: Address WR and OL through draft and free agency
    detail: >
      The offense cannot function without better weapons and protection. Draft capital
      (#7 overall) and free agency must be used aggressively on offense.
  - priority: Maintain defensive foundation
    detail: >
      The 2011 defense was the team's strength. The new DC must build on this, not
      tear it down. Defensive personnel should be retained where possible.

