# GM STATUS

gm:
  name: Gene Smith
  title: General Manager
  contract: Extended through 2014 (by Weaver before sale)
  tenure: GM since 2009 (with organization as scout since 1994)
  gm_record: 22-42 (.344)
  status: RETAINED_BUT_VULNERABLE
  smith_profile:
    strengths:
      - Deep organizational knowledge (with Jaguars since 1994)
      - Scouting background — understands talent evaluation process
      - Loyal to the organization
    weaknesses:
      - Poor drafting record at premium positions (Gabbert, Alualu)
      - Over-reliance on small-school talent with inconsistent results
      - Conservative free agency approach that has left roster thin
      - 22-42 record as GM speaks for itself
    relationship_to_new_hc: >
      The HC must work with Smith but should not assume Smith will be the long-term
      GM. Smith's contract runs through 2014, but Khan could buy him out at any time.
      The HC should build a direct relationship with Khan that survives a potential
      GM change. The HC should be professional and collaborative with Smith while
      understanding that the GM situation is inherently unstable.
    sim_note: >
      In real history, Khan retained Smith for the 2012 season but fired him after
      the Jaguars went 2-14 in 2012. The sim may diverge, but the structural
      instability of the GM position is a real factor regardless.

