# MAJOR ORG PRESSURE POINTS

pressure_points:
  - id: ownership_transition
    description: >
      First-time NFL owner taking over. Khan must learn the business while making
      his first major hire. The HC must manage up — educating Khan on NFL realities
      without being condescending or manipulative.
    severity: HIGH
    timeline: IMMEDIATE

  - id: gm_instability
    description: >
      Gene Smith is retained but his track record is poor. The HC must work with
      Smith while preparing for the possibility that Smith is replaced within 1-2
      years. The HC-GM relationship is structurally pre-loaded with tension.
    severity: HIGH
    timeline: ONGOING

  - id: gabbert_evaluation
    description: >
      The most important football question facing the franchise: can Blaine Gabbert
      develop into a viable NFL starter? The answer determines the entire roster-building
      timeline. If yes, the rebuild is faster. If no, a new QB must be found, which
      could take years.
    severity: CRITICAL
    timeline: 2012_SEASON

  - id: wr_talent_void
    description: >
      The WR corps is among the worst in the NFL. No #1 receiver exists on the roster.
      The 2012 draft and free agency must address this. Without receiving weapons,
      no QB — Gabbert or otherwise — can succeed.
    severity: HIGH
    timeline: OFFSEASON_PRIORITY

  - id: market_viability
    description: >
      Jacksonville's small market, attendance concerns, and persistent relocation
      rumors create background pressure. Winning is the best answer, but the HC must
      also be a public-facing figure who sells the franchise to the community.
    severity: MODERATE
    timeline: ONGOING

  - id: mjd_contract
    description: >
      Maurice Jones-Drew is the team's best player and entering the final years of
      his contract. He will want a new deal. If negotiations become contentious, the
      locker room dynamic is affected. The HC must manage the star player while the
      front office handles the business.
    severity: MODERATE
    timeline: 2012_OFFSEASON

