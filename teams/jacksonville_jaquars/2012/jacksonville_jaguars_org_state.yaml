# QB SITUATION

quarterback:
  current_starter: Blaine Gabbert
  gabbert_context: >
    Second-year QB. Drafted 10th overall in 2011 (traded up from 16th — cost included
    a 2nd round pick to Washington). Rookie year was one of the worst by a starting
    QB in 2011: last in passer rating among qualifiers, 2,214 passing yards,
    12 TD / 11 INT, sacked 40 times. Looked overwhelmed by NFL speed, indecisive
    in the pocket, unable to process defenses quickly. The question is whether his
    struggles are developmental (fixable with coaching and better talent around him)
    or fundamental (limited ceiling regardless of environment). The new HC's assessment
    of Gabbert is the most consequential football evaluation in this job.
  backup: Luke McCown
  mccown_context: >
    Veteran backup. Started first two games of 2011 before being replaced by Gabbert.
    Career journeyman. Not a long-term answer.
  year_1_qb_priorities:
    - "Evaluate Gabbert honestly — is he developable or a sunk cost?"
    - "Design an offensive system that maximizes Gabbert's limited strengths (if retained)"
    - "Identify QB contingency — if Gabbert fails, what is the plan?"
    - "Protect Gabbert better — OL improvement is mandatory"
    - "Give Gabbert weapons — WR talent acquisition is critical"

