# ============================================================
# ENGINE RULES (patch into Master Engine)
# ============================================================
# 1. If a calendar file exists, it is the SOURCE OF TRUTH
#    for time progression. The engine stops inferring dates.
# 2. Turn advancement moves by calendar node(s), not by
#    guessed date jumps.
# 3. Weekly-turn roles (HC, Coordinator) consume ONE node
#    per turn.
# 4. Monthly-turn roles (Position Coach, QC, GA) consume
#    ALL nodes within the current month per turn, using
#    the compression_map to identify primary_event and
#    summary_hint.
# 5. Zoom-in turns can temporarily isolate ONE node inside
#    a monthly block for detailed narration.
# 6. The engine must update runtime fields after every turn:
#    - current_node advances
#    - previous_node updates
#    - next_node updates
#    - completed_nodes appends consumed node IDs
# 7. Game results (result, record) are WRITTEN by the engine
#    AFTER simulation resolves each game. They are null until
#    played.
# 8. Draft selections are determined by the simulation during
#    the DRAFT phase nodes. The calendar only provides the
#    date, pick round/number, NOT the player selected.
# 9. start/end define the FULL WEEK WINDOW for the node.
#    game_date is the actual game day within that window.
#    The engine uses start/end for turn boundaries and
#    game_date for event timing within the turn.
# 10. Playoff nodes activate ONLY if the Jaguars qualify.
#     The engine must check regular season results before
#     advancing into playoff nodes. Inactive playoff nodes
#     are skipped and the engine advances to season_end.
# ============================================================
