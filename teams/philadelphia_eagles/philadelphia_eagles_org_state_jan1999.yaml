# MAJOR ORG PRESSURE POINTS

pressure_points:
  - id: media_hostility
    description: >
      Philly media panned the Reid hire. The staff will be under scrutiny from
      day one. Every decision will be questioned. Stone's HOF name on the staff
      will generate media interest he cannot control.
    severity: MODERATE
    timeline: ONGOING

  - id: offensive_line_crisis
    description: >
      The OL is the team's worst unit. Reid wants to throw the ball. The OL
      cannot protect the QB. This tension will define the 1999 offense.
      The QB (Pederson or the rookie) will be hit constantly.
    severity: HIGH
    timeline: SEASON_LONG

  - id: qb_transition
    description: >
      Reid will draft a franchise QB and must manage the Pederson-to-rookie
      transition. The timing of the switch will dominate media coverage and
      locker room dynamics in the second half of the season.
    severity: MODERATE
    timeline: MIDSEASON

  - id: system_installation_pace
    description: >
      The WCO is complex. Players and coaches are learning simultaneously.
      Execution will be sloppy for months. Reid's patience will be tested.
      The question is whether the team looks more competent in December
      than it does in September.
    severity: MODERATE
    timeline: FULL_YEAR

  - id: fan_patience
    description: >
      Philadelphia fans are passionate and angry. 3-13 broke them. Reid is
      unknown. If the team starts 0-4 or worse, the noise will be deafening.
      It won't threaten Reid's job (Lurie is patient) but it will affect
      the building's energy.
    severity: LOW_TO_MODERATE
    timeline: EARLY_SEASON

