# QB SITUATION

quarterback:
  current_starter: Doug Pederson
  pederson_context: >
    Veteran backup who followed Reid from Green Bay. Knows the WCO. Will start
    early in 1999 while the drafted QB learns the system. Pederson is a placeholder,
    not the franchise answer.
  draft_target: >
    Reid is expected to draft a QB with the #2 overall pick (April 1999).
    Donovan McNabb (Syracuse) is the consensus target. Tim Couch (#1 to Cleveland)
    is the only QB expected to go before the Eagles pick. Other possibilities:
    Akili Smith, Daunte Culpepper, Cade McNown — but McNabb is the primary target.
  drafted_qb_role_year_1: >
    Likely backs up Pederson early, takes over as starter mid-season once Reid
    decides the rookie is ready. Timeline depends on Pederson's performance and
    the rookie's development speed.

