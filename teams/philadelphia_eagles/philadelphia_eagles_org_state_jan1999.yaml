# IMMEDIATE FIRST-TURN OPERATIONAL PRIORITIES

first_turn_priorities:
  if_stone_is_hired:
    - priority: Learn the building
      detail: >
        Physical layout of Veterans Stadium complex. Film room location.
        Meeting rooms. Equipment. Who does what. How to operate the film
        editing system. Where things are.
    - priority: Meet every offensive coach
      detail: >
        Introduce himself as a QC coach, not a Hall of Famer. Set the tone
        with humility and eagerness. Ask each coach what they need from QC.
    - priority: Begin WCO playbook study
      detail: >
        Reid's playbook (in whatever draft form exists in February) becomes
        Stone's primary study material. He must learn terminology before he
        can do film work accurately.
    - priority: First film assignment from Dowhower
      detail: >
        Dowhower will assign an initial film task as a competence test.
        Likely: break down a specific game film with basic tendency charting.
        This is Stone's first evaluation moment. The quality of this
        deliverable sets Dowhower's trust baseline.
    - priority: Observe a TE meeting (if Shurmur allows)
      detail: >
        Stone should ask Shurmur if he can sit in on TE meetings to learn
        the WCO TE assignments. This must be framed as a learning request,
        not a coaching request. Shurmur decides whether to invite him.
    - priority: Find Ron Rivera
      detail: >
        Rivera is the natural peer ally — a former star player making the
        same coaching transition. An early conversation with Rivera about
        the player-to-coach adjustment could be one of Stone's most valuable
        first-week actions.
