# OFFENSIVE INSTALL STATUS

offense:
  system: West Coast Offense (Walsh/Holmgren lineage)
  install_status: NOT_STARTED  # playbook doesn't get taught until OTAs/minicamp
  play_caller: Andy Reid
  oc_role: Rod Dowhower — assists installation, provides system depth, does not call plays
  terminology: Walsh/Holmgren WCO language (being adapted by Reid for Eagles)
  playbook_phase: >
    As of January 1999, there is no Eagles playbook yet. Reid is building it.
    The playbook will be constructed from Reid's Green Bay experience, adapted
    for the Eagles' personnel (which mostly doesn't exist yet). Installation
    begins at OTAs. Training camp is the primary install window.
  offensive_identity_target: >
    Timing-based passing game. Short-to-intermediate efficiency. Play-action
    deep shots. TE involvement in passing game. Multiple personnel packages.
    Ball control through completion percentage, not run volume.

