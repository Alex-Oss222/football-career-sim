# TE ROOM SNAPSHOT

te_room:
  status: THIN
  players:
    - name: Chad Lewis
      age: 27
      acquisition: signed as UDFA by Rams (1997), released, signed by Eagles
      strengths: >
        Reliable hands. Professional attitude. Runs good routes for his athleticism.
        Smart player who understands assignments. Coachable.
      weaknesses: >
        Limited athleticism. Not a dynamic weapon. Will never be a mismatch creator.
        Adequate blocker, not a strength.
      development_potential: >
        Can become a reliable starter with good coaching. Ceiling is a solid,
        dependable TE — not a Pro Bowler. His value is reliability, not explosiveness.
      stone_relevance: >
        Lewis is the kind of player Stone can help develop. He needs technique
        refinement, route discipline, and confidence — all Stone strengths.
        But Stone coaches Lewis through Shurmur, not directly.
    - name: Roster TBD
      note: >
        Additional TEs will be added through free agency and the draft. The TE room
        entering training camp will look different from the January roster. Expect
        2-3 additional TEs competing for roster spots.
  room_needs:
    - WCO TE assignment mastery (complex — routes, protections, adjustments)
    - blocking technique refinement
    - route discipline within the timing system
    - confidence and buy-in to new coaching staff

