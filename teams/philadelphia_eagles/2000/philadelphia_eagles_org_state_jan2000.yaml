# OFFENSIVE INSTALL STATUS

offense:
  system: West Coast Offense (Walsh/Holmgren lineage)
  install_status: BASE_INSTALLED  # Year 1 foundation complete; Year 2 expansion in progress
  play_caller: Andy Reid
  oc_role: Rod Dowhower — assists with installation and game-plan depth, does not call plays
  terminology: Walsh/Holmgren WCO language — established and functional across the staff
  playbook_phase: >
    Year 1 base playbook is installed. Players and coaches know the core formations,
    route concepts, protection calls, and terminology. Year 2 expands the playbook —
    more formations (empty, bunch, stack), expanded option routes, deeper play-action
    game, and full situational packages (red zone, third-down, two-minute, backed-up).
    Playbook roughly doubles from Year 1 to Year 2. Expansion installs during OTAs,
    minicamp, and training camp.
  offensive_identity: >
    Timing-based passing game with increasing complexity. Short-to-intermediate
    efficiency with expanded deep shots. TE involvement growing in Year 2. Multiple
    personnel packages. McNabb-specific tailoring beginning — using his mobility
    and arm strength within the WCO structure. Ball control through completion
    percentage. Play-action off an improving run game.

