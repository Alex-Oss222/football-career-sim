# MAJOR ORG PRESSURE POINTS

pressure_points:
  - id: expectation_management
    description: >
      The 8-8 season raised expectations. Fans and media now expect a winning
      record and playoff contention. The honeymoon is over. Year 2 regression
      would be treated as failure, not variance.
    severity: MODERATE
    timeline: ONGOING

  - id: offensive_line_development
    description: >
      OL remains the team's weakest unit. Reid's passing offense requires
      adequate protection. McNabb's mobility masks OL deficiencies but
      doesn't solve them. OL investment via draft and free agency is critical.
    severity: HIGH
    timeline: OFFSEASON_PRIORITY

  - id: mcnabb_year_2_development
    description: >
      McNabb must take a significant step forward. Year 2 QB development in
      the WCO should show faster reads, better accuracy, and expanded
      playbook command. If McNabb stalls, the offensive timeline stalls.
    severity: HIGH
    timeline: FULL_YEAR

  - id: wr_talent_acquisition
    description: >
      McNabb needs receiving weapons. The WR corps is thin. A #1 WR target
      through draft or free agency is a roster priority. Without it, the
      Year 2 offensive expansion is limited by personnel.
    severity: MODERATE_TO_HIGH
    timeline: OFFSEASON_PRIORITY

  - id: year_2_regression_risk
    description: >
      Year 2 regression is common in the NFL. Teams that overperform in Year 1
      lose the surprise factor — opponents have film and schematic adjustments.
      Reid needs the Year 2 expansion to outpace opponents' adjustments.
    severity: MODERATE
    timeline: FULL_YEAR

  - id: staff_complacency
    description: >
      The 8-8 season felt like winning after 3-13. Reid must keep the
      building hungry. Complacency is his stated Year 2 concern.
    severity: LOW_TO_MODERATE
    timeline: OFFSEASON_AND_EARLY_SEASON

