# OFFSEASON OPERATIONAL PRIORITIES

offseason_priorities:
  - priority: Self-scouting
    detail: >
      Full analysis of 1999 offensive tendencies. Formation frequency, personnel
      distribution, play-call patterns by down/distance/field zone. Identify
      predictable tendencies that opponents can exploit. Correct them in Year 2.
  - priority: Year 2 playbook expansion planning
    detail: >
      Reid and Dowhower design the Year 2 install — which concepts to add,
      in what sequence, at what point in the offseason. The expansion must be
      structured (OTAs → minicamp → camp → regular season) so players can
      absorb it without overload.
  - priority: Free agency evaluation
    detail: >
      Banner and Reid identify free agent targets that fit the WCO and the
      roster needs. Priority positions: OL, WR, DL. Cap flexibility allows
      more aggressive pursuit than 1999.
  - priority: Draft board construction
    detail: >
      Eagles pick mid-to-late teens (exact position TBD by engine based on 8-8
      and league standings). Draft board emphasis: skill-position help, OL
      depth, defensive front talent. Combine evaluation (Feb 24-28) and pro
      days (March) are the primary scouting windows.
  - priority: McNabb offseason development
    detail: >
      Childress and Reid design McNabb's offseason program — film study,
      footwork refinement, expanded route-tree work with receivers, leadership
      development. McNabb's offseason work determines how quickly he can
      handle the Year 2 expansion.