# QB SITUATION

quarterback:
  current_starter: Donovan McNabb
  mcnabb_context: >
    Franchise QB entering Year 2. Drafted with the #2 overall pick in 1999.
    Year 1 showed enough promise to justify the investment — athleticism,
    arm strength, leadership, and improving command of the WCO. Year 2 is
    about significant development — faster reads, fuller playbook command,
    better accuracy, improved decision-making under pressure. McNabb's
    development is the organizational priority.
  backup: Doug Pederson
  pederson_context: >
    Veteran backup who knows the WCO from Green Bay. No longer a bridge
    starter — McNabb is the unquestioned #1. Pederson is the safety net
    and the experienced voice in the QB room.
  year_2_qb_priorities:
    - "McNabb reading defenses faster — pre-snap ID and post-snap progression"
    - "Expanded playbook command — handling Year 2 complexity"
    - "Accuracy improvement — completion percentage in the short-to-intermediate game"
    - "Pocket discipline — balance between extending plays and staying in structure"
    - "Leadership development — McNabb becoming the offensive leader"

