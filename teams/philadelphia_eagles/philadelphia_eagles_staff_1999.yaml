# PHILADELPHIA EAGLES — 1999 COACHING STAFF MAP
# Sim Reference: NPC coach profiles for runtime staff politics, chain of command, and relationship tracking
# Sim Rule: No actual future outcomes. All assessments reflect January 1999 context.
# Note: Stone's trust levels assume he enters as Offensive QC.

---

team: Philadelphia Eagles
season: 1999
head_coach: Andy Reid
staff_build_status: FROM_SCRATCH
holdovers_from_rhodes: [John Harbaugh, Juan Castillo]
staff_culture: teaching_first, low_ego, collaborative, process_oriented

---

staff:

  - name: Andy Reid
    title: Head Coach
    side: offense
    reports_to: Jeffrey Lurie (owner), Joe Banner (president)
    authority_level: total
    age: 40
    background: >
      Seven years as Packers assistant (TE/OL 1992-96, QB coach 1997-98).
      Coached Brett Favre. Won Super Bowl XXXI. Bill Walsh tree via Holmgren.
      College OL coach for 10 years before NFL. First-time HC. Never been a coordinator.
    teaching_style: >
      Structured, patient, detail-oriented. Meetings are organized teaching sessions
      with clear objectives. Uses film as a teaching tool. Explains the "why" behind
      every concept. Adjusts communication to the individual. Does not yell — teaches.
      Expects the same from his staff.
    personality: >
      Warm but demanding. Calm authority. Treats people with dignity. Quick to take blame,
      slow to assign it publicly. Privately direct — tells the truth without cruelty.
      Carries a notecard that says "Don't Judge." Mormon faith shapes his values.
      Encourages personality and individuality within structure.
    what_he_cares_about:
      - teaching ability above all
      - character and integrity
      - coachability and curiosity
      - full buy-in to the WCO system
      - process over results (especially in year 1)
      - low-ego assistants who do their jobs without needing validation
    what_annoys_him:
      - ego and entitlement
      - disloyalty to the system
      - inconsistency and unreliability
      - yelling as a substitute for teaching
      - cynicism about the process or the losing
      - coaches who go through the motions
    openness_to_stone: MODERATE_TO_HIGH
    openness_notes: >
      Reid values teachers and high-character people over pedigree. His hiring pattern
      proves he will take non-traditional candidates. A HOF TE willing to start at QC
      is interesting to Reid — but he needs to be convinced Stone's ego can handle it.
      The interview will determine everything.
    trust_baseline_with_stone: LOW_NEUTRAL
    trust_notes: >
      No prior relationship. Stone must earn trust through work, not credentials.
      Reid will watch Stone's behavior more than his output initially — ego signals
      matter more than film quality in the first 30 days.
    role_relative_to_stone: ULTIMATE_EVALUATOR
    role_notes: >
      Reid sets the culture. If Stone fits the culture, he thrives. If he doesn't,
      no amount of football knowledge saves him. Reid evaluates Stone through
      observation and staff feedback, not formal reviews.

  - name: Rod Dowhower
    title: Offensive Coordinator
    side: offense
    reports_to: Andy Reid
    authority_level: high (offensive scheme execution, but Reid calls plays and controls the system)
    age: 55
    background: >
      36-year coaching career. Started under Don Coryell at San Diego State (1966-72) —
      this is directly relevant to Stone, who played in the Coryell system. Followed
      Coryell to the Cardinals. Later worked under Bill Walsh at Stanford (QB coach 1977-78).
      Head coach at Stanford (1979), Indianapolis Colts (1985-86, 5-24), Vanderbilt (1995-96, 4-18).
      OC/QB coach for Denver, Atlanta, Washington (Super Bowl XXVI ring), Cleveland (under Belichick),
      NY Giants (QB coach 1997-98). 15 jobs in 27 years. Journeyman with deep system knowledge
      across both Coryell and Walsh lineages. Reid hired him the day after becoming HC.
    teaching_style: >
      Old-school, professional, system-oriented. Experienced enough to install any
      offense. Not charismatic — workmanlike. Runs efficient meetings. Values precision
      in terminology and execution. Does not waste time.
    personality: >
      Quiet professional. Has seen everything — multiple HC jobs, multiple firings,
      multiple systems. Not bitter, not ambitious. Near the end of his career and
      comfortable with it. Steady hand who provides Reid with institutional knowledge
      Reid doesn't have. Not competitive with Reid — serves the HC.
    what_he_cares_about:
      - accurate, on-time deliverables from QC coaches
      - film work that is organized and correctly labeled
      - staff who anticipate needs rather than wait for assignments
      - system precision — correct terminology, correct concepts
      - chain of command respect — QC reports to OC, not HC
    what_annoys_him:
      - sloppy film work
      - QC coaches who need to be managed
      - people who skip steps or cut corners
      - staff who go around him to Reid
      - having to explain the same thing twice
    openness_to_stone: MODERATE
    openness_notes: >
      Dowhower will evaluate Stone on operational competence, not playing pedigree.
      He does not care that Stone is a HOF player — he cares whether Stone's film work
      is accurate and on time. However, Dowhower's Coryell background gives him a
      natural bridge to Stone's playing experience. If Stone demonstrates system
      intelligence, Dowhower will respect it. Dowhower has worked with former players
      before and knows the transition challenges.
    trust_baseline_with_stone: LOW_NEUTRAL
    trust_notes: >
      No prior relationship. Trust is built through reliable deliverables. Dowhower
      will assign work, check it, and calibrate trust based on quality. This is
      transactional — do good work, earn trust. Do bad work, lose access.
    role_relative_to_stone: PRIMARY_EVALUATOR
    role_notes: >
      Dowhower is Stone's direct supervisor for daily work assignments. His assessment
      of Stone's reliability and competence is the primary input Reid uses to evaluate
      Stone. If Dowhower trusts Stone, Reid will hear about it. If Dowhower doesn't,
      Stone is stuck.
    sim_note: >
      Dowhower's Coryell lineage is a hidden asset for Stone. Dowhower speaks both
      Coryell and Walsh. He can translate between the two systems in a way that helps
      Stone learn the WCO faster. Whether Dowhower chooses to mentor Stone this way
      depends on the relationship Stone builds.

  - name: Brad Childress
    title: Quarterbacks Coach
    side: offense
    reports_to: Rod Dowhower, Andy Reid
    authority_level: moderate (QB room authority, significant offensive influence because Reid is a QB-centric coach)
    age: 42
    background: >
      One year of NFL coaching experience (Colts QB coach, 1985 — a 5-11 team).
      Spent the next 13 years in college: OC at Wisconsin under Barry Alvarez.
      Reid hired him for the QB room despite the thin NFL résumé.
    teaching_style: >
      Organized, detail-oriented, system-focused. Learned the WCO at Wisconsin
      (Alvarez ran WCO concepts). Intense in meetings. Expects preparation.
    personality: >
      Serious, focused, somewhat intense. Not warm like Reid — more businesslike.
      Ambitious. Will eventually want more responsibility.
    what_he_cares_about:
      - QB development and protection
      - system execution precision
      - film preparation quality (heavily dependent on QC work)
    what_annoys_him:
      - film cut-ups that are disorganized or missing clips
      - people who don't know the system terminology
      - anything that wastes meeting time
    openness_to_stone: NEUTRAL
    openness_notes: >
      Childress will interact with Stone primarily through film work requests.
      Not hostile, not warm. Professional. Will notice if Stone's work is good.
    trust_baseline_with_stone: LOW_NEUTRAL
    role_relative_to_stone: EVALUATOR_SECONDARY
    role_notes: >
      Childress may assign Stone QB-specific film tasks. The quality of these
      deliverables shapes Childress's opinion, which feeds to Reid.

  - name: Pat Shurmur
    title: Tight Ends Coach / Offensive Line Assistant
    side: offense
    reports_to: Rod Dowhower, Andy Reid
    authority_level: moderate (TE room authority)
    age: 33
    background: >
      Never coached in the NFL. Eight years at Michigan (TEs, OL, special teams).
      One year at Stanford as OL coach. Reid hired him based on teaching ability
      and character. Shurmur is the staff member most analogous to Stone — a
      position coach with zero NFL coaching experience.
    teaching_style: >
      Structured college coaching approach. Meeting-room oriented. Prepared,
      organized. Learning the NFL game alongside his players. Comfortable teaching
      fundamentals; still developing NFL-level schematic teaching.
    personality: >
      Earnest, hardworking, humble. Knows he's in over his head at the NFL level
      and compensates with preparation and effort. Not threatened by expertise —
      but could become threatened if a subordinate (like Stone) visibly knows
      more about the TE position than he does and handles it poorly.
    what_he_cares_about:
      - TE room development and fundamentals
      - WCO TE assignments executed correctly
      - support from QC staff (film cuts, tendency breakdowns)
      - being respected as the room's authority despite limited NFL experience
    what_annoys_him:
      - being corrected in front of players
      - feeling undermined by someone with more football credibility
      - receiving unsolicited coaching advice from people outside his room
      - sloppy preparation in materials he depends on
    openness_to_stone: CAUTIOUS
    openness_notes: >
      Shurmur will be acutely aware that Stone knows more about playing TE than
      he does. This creates both an opportunity and a threat. If Stone supports
      Shurmur respectfully — sharing observations as data, not corrections —
      Shurmur will value him enormously. If Stone makes Shurmur feel inadequate,
      the relationship is poisoned. Shurmur's ego is not large, but his authority
      is fragile because it's new.
    trust_baseline_with_stone: LOW_CAUTIOUS
    trust_notes: >
      Stone must actively build trust by respecting Shurmur's authority.
      Every interaction in the TE room is a trust test. Shurmur is watching
      for signals: does Stone defer? Does Stone support? Or does Stone compete?
    role_relative_to_stone: MENTOR_POTENTIAL_AND_OBSTACLE_POTENTIAL
    role_notes: >
      This is the most complex relationship on the staff for Stone. Shurmur is
      simultaneously: (a) the coach Stone could learn the most from about running
      a room, (b) the coach most likely to feel threatened by Stone's expertise,
      and (c) the coach whose success most directly creates Stone's promotion path
      (if Shurmur advances, the TE coach job opens). Stone must make Shurmur better
      without making Shurmur feel small.

  - name: David Culley
    title: Wide Receivers Coach
    side: offense
    reports_to: Rod Dowhower, Andy Reid
    authority_level: moderate (WR room authority)
    age: 43
    background: >
      Three years as Steelers WR coach. Coached Yancey Thigpen to a Pro Bowl.
      Most NFL-experienced offensive position coach hire. Steady, professional.
    teaching_style: >
      Player-development focused. Technique-oriented. Professional NFL teaching
      approach. Reliable in his room.
    personality: >
      Quiet, steady, professional. Not flashy. Does his job well. Loyal —
      will stay with Reid longer than any other assistant (18 years total).
    what_he_cares_about:
      - WR development and technique
      - good film preparation from QC staff
      - professional environment
    what_annoys_him:
      - disorganization
      - people who don't do their homework
    openness_to_stone: NEUTRAL_POSITIVE
    openness_notes: >
      Culley has NFL experience and respects professional players. He will treat
      Stone as a colleague if Stone acts like one. No threat dynamic — different
      position group. Stone's route craft knowledge could be useful to Culley
      in informal conversations about releases and stems.
    trust_baseline_with_stone: NEUTRAL
    role_relative_to_stone: NEUTRAL_COLLEAGUE
    role_notes: >
      Low-drama relationship. Culley may request WR film cuts from Stone. Quality
      of those deliverables shapes a mild opinion. Not a make-or-break relationship.

  - name: Juan Castillo
    title: Offensive Line Coach
    side: offense
    reports_to: Rod Dowhower, Andy Reid
    authority_level: moderate (OL room authority)
    age: 39
    background: >
      Rhodes holdover. One year as NFL OL coach. Reid kept him based on personal
      evaluation. Has something to prove — he survived the coaching change and
      wants to justify Reid's trust.
    teaching_style: >
      Physical, hands-on. OL coaching is the most technique-intensive position
      coaching in football. Castillo is a trench coach — intensity is high in
      his room.
    personality: >
      Intense, passionate, hardworking. Grateful for the opportunity. Loyal to
      Reid for keeping him.
    what_he_cares_about:
      - OL development (the 1999 OL will be bad — Castillo is under pressure)
      - protection schemes that keep the QB upright
      - staff members who understand blocking
    what_annoys_him:
      - people who don't understand the trenches
      - film work that ignores protection breakdowns
    openness_to_stone: NEUTRAL
    openness_notes: >
      Stone's inline blocking knowledge (75 rating) gives him some credibility
      with Castillo. OL coaches respect TEs who could block. Not a primary
      relationship but functional.
    trust_baseline_with_stone: NEUTRAL
    role_relative_to_stone: NEUTRAL_COLLEAGUE

  - name: Tom Melvin
    title: Offensive Assistant
    side: offense
    reports_to: Rod Dowhower, Andy Reid
    authority_level: low (support role, similar level to QC)
    age: unknown (mid-career college coach)
    background: >
      Never coached in the NFL. Eight years as OC at Division III Occidental College.
      Reid hired him for teaching ability and character. Melvin is one step above
      QC level — an offensive assistant who supports the whole offensive staff.
    teaching_style: college-influenced, fundamentals-oriented, learning NFL pace
    personality: >
      Humble, hardworking, aware he's the least credentialed offensive coach on
      the staff. Compensates with effort and attitude.
    what_he_cares_about:
      - learning the NFL game
      - doing good work
      - not embarrassing himself
    openness_to_stone: POSITIVE
    openness_notes: >
      Melvin and Stone are peers in terms of NFL coaching experience (neither has any).
      Melvin will likely be a natural ally — both are learning together. No threat
      dynamic. Potential bond over shared newcomer experience.
    trust_baseline_with_stone: NEUTRAL_POSITIVE
    role_relative_to_stone: PEER_ALLY_POTENTIAL
    role_notes: >
      Melvin later becomes the TE coach when Shurmur is promoted to QB coach
      (after Dowhower retires). In the sim's divergent timeline, Melvin's trajectory
      is unknown, but his presence as a peer is relevant.

  # --- DEFENSIVE STAFF ---

  - name: Jim Johnson
    title: Defensive Coordinator
    side: defense
    reports_to: Andy Reid
    authority_level: high (near-total defensive autonomy)
    age: 57
    background: >
      Eight years as Cardinals LB coach (Arizona never ranked higher than 20th in defense).
      Two years as Colts DC (ranked 18th and 26th in points allowed). Not a hot candidate.
      Reid hired him and gave him full defensive authority. Johnson's blitz-heavy,
      aggressive scheme will define the Eagles' defensive identity.
    teaching_style: >
      Intense, aggressive, creative. Designs exotic blitz packages. Demands
      defensive intelligence. His meetings are high-energy and high-detail.
    personality: >
      Fiery, competitive, passionate about defense. Respected by defensive players.
      Not involved in offensive staff dynamics — runs his own kingdom.
    what_he_cares_about:
      - his defense
      - defensive film preparation (from defensive QC, not Stone)
      - Reid giving him autonomy
    openness_to_stone: IRRELEVANT
    openness_notes: >
      Johnson has minimal interaction with offensive QC. He runs the defense.
      Stone's relationship with Johnson is distant and professional.
    trust_baseline_with_stone: N/A
    role_relative_to_stone: NEUTRAL_SEPARATE_DOMAIN

  - name: John Harbaugh
    title: Special Teams Coordinator
    side: special_teams
    reports_to: Andy Reid
    authority_level: moderate (full special teams authority)
    age: 36
    background: >
      Rhodes holdover. One year as NFL assistant (1998). Prior career: special teams
      coaching at five colleges (Cincinnati, Indiana, Western Michigan, Morehead State,
      Pittsburgh). Reid kept him based on personal evaluation of his work.
    teaching_style: >
      Energetic, organized, demanding. Brings college coaching intensity to the NFL.
      Runs his special teams meetings like a classroom. Passionate about fundamentals.
    personality: >
      Intense, competitive, principled. Strong personality. Faith-oriented (like Reid).
      Ambitious — will eventually want more. Loyal to Reid for keeping him.
    what_he_cares_about:
      - special teams excellence
      - staff members who contribute to special teams (all coaches do in some capacity)
      - being respected despite being a holdover
    openness_to_stone: NEUTRAL_POSITIVE
    openness_notes: >
      Harbaugh respects playing pedigree and teaching ability. If Stone shows
      professionalism and willingness to contribute to special teams prep,
      Harbaugh will be positive. Not a primary relationship.
    trust_baseline_with_stone: NEUTRAL
    role_relative_to_stone: NEUTRAL_COLLEAGUE

  - name: Ron Rivera
    title: Linebackers Coach
    side: defense
    reports_to: Jim Johnson
    authority_level: moderate (LB room authority)
    age: 37
    background: >
      Former NFL player (LB, 1985 Bears — Super Bowl XX). Two years as entry-level
      QC coach with the Bears. That's his entire coaching résumé. Reid hired a former
      star player with minimal coaching experience — sound familiar?
    teaching_style: >
      Still developing. Player-to-coach transition in progress. Uses playing experience
      to connect with players. Learning the coaching craft.
    personality: >
      Professional, respectful, hard-working. Understands what it's like to be a
      famous former player learning to coach. Could be a genuine peer for Stone.
    what_he_cares_about:
      - earning respect as a coach, not just a former player
      - developing his LB room
      - proving he belongs
    openness_to_stone: HIGH
    openness_notes: >
      Rivera is the closest analogue to Stone on the staff — a former star player
      making the coaching transition with minimal experience. He will understand
      Stone's challenges instinctively. Potential genuine friendship and mutual
      support. Different side of the ball, so no competitive tension.
    trust_baseline_with_stone: NEUTRAL_POSITIVE
    role_relative_to_stone: PEER_ALLY_NATURAL
    role_notes: >
      Rivera's experience mirrors Stone's path. Both are former players with
      elite playing careers and thin coaching résumés. The bond potential is high.
      Rivera can share insights about the player-to-coach transition that no one
      else on this staff can.

  - name: Leslie Frazier
    title: Secondary Coach
    side: defense
    reports_to: Jim Johnson
    authority_level: moderate (secondary room authority)
    age: 40
    background: >
      Started the football program at NAIA Trinity International. Two years as
      secondary coach at Illinois under Ron Turner. First NFL coaching job.
    teaching_style: college_oriented, fundamentals, developing
    personality: calm, professional, humble, learning
    openness_to_stone: NEUTRAL
    trust_baseline_with_stone: NEUTRAL
    role_relative_to_stone: NEUTRAL_COLLEAGUE

  - name: Steve Spagnuolo
    title: Defensive Assistant / Quality Control
    side: defense
    reports_to: Jim Johnson
    authority_level: low (QC level — same tier as Stone)
    age: 39
    background: >
      Never coached in the NFL. Position coach at multiple colleges (Lafayette, Maine,
      Rutgers). One year in the World League. Reid found him and hired him.
    teaching_style: developing, eager, detail-oriented
    personality: >
      Intense, ambitious, eager to prove himself. Defensive-side QC — he and Stone
      are structural peers on opposite sides of the ball.
    openness_to_stone: POSITIVE
    openness_notes: >
      Fellow QC-level coach. Both are new to the NFL. Natural peer bond.
      No competitive tension (different sides of ball).
    trust_baseline_with_stone: NEUTRAL_POSITIVE
    role_relative_to_stone: PEER_ALLY_POTENTIAL

  - name: Sean McDermott
    title: Scouting Coordinator / Assistant to the Head Coach
    side: scouting_operations
    reports_to: Andy Reid
    authority_level: low (administrative/scouting support)
    age: 24
    background: >
      Former player at William & Mary (1994-97). Graduate assistant 1998.
      Eagles scouting administrative coordinator 1998. Reid promoted him to
      assistant to the HC / scouting coordinator in 1999. Youngest member of
      the staff. Not a coaching role — an organizational support role.
    teaching_style: N/A (not a position coach)
    personality: >
      Young, driven, detail-oriented, organizational. Learning the NFL from
      the scouting and front-office side. Ambitious.
    openness_to_stone: POSITIVE
    openness_notes: >
      McDermott is junior to everyone. No threat dynamic with Stone.
      Could be an organizational ally for navigating the building.
    trust_baseline_with_stone: NEUTRAL
    role_relative_to_stone: NEUTRAL_JUNIOR_PEER

# --- SUMMARY: STONE'S RELATIONSHIP MAP ---

relationship_map:
  ultimate_evaluator: Andy Reid
  primary_evaluator: Rod Dowhower
  secondary_evaluators: [Brad Childress, Pat Shurmur]
  most_complex_relationship: Pat Shurmur
  natural_allies: [Ron Rivera, Tom Melvin, Steve Spagnuolo]
  potential_mentor: Rod Dowhower (Coryell bridge)
  hidden_asset: Dowhower's Coryell background — can translate between Stone's playing system and Reid's WCO
  biggest_relationship_risk: Shurmur dynamic — Stone must support without undermining
  irrelevant_relationships: [Jim Johnson, Leslie Frazier] # different domain, minimal interaction
