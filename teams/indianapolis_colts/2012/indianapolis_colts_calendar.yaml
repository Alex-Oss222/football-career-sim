    start: 2012-01-02
    end: 2012-01-10
    phase: SEASON_END
    sub_phase: EXIT_INTERVIEWS
    notes: >
      January 2: Bill Polian and Chris Polian fired. Player
      exit interviews. 2-14 season review. Franchise at a
      historic crossroads with Peyton Manning's health
      uncertain and the #1 overall pick secured.

  # ----------------------------------------------------------
  # NEW REGIME — GM AND HC HIRING
  # ----------------------------------------------------------

  - id: gm_hire
    label: Ryan Grigson Hired as GM
    start: 2012-01-11
    end: 2012-01-16
    phase: OFFSEASON
    sub_phase: FRONT_OFFICE_TRANSITION
    notes: >
      January 11: Ryan Grigson named new GM. Begins
      immediate evaluation of roster, coaching staff, and
      the Peyton Manning situation.

  - id: hc_search
    label: Head Coach Search / Jim Caldwell Fired
    start: 2012-01-17
    end: 2012-01-24
    phase: OFFSEASON
    sub_phase: COACHING_SEARCH
    notes: >
      January 17: Jim Caldwell fired as head coach. Grigson
      conducts coaching search. Chuck Pagano emerges as the
      leading candidate.

  - id: hc_hire
    label: Chuck Pagano Hired as Head Coach
    start: 2012-01-25
    end: 2012-01-31
    phase: OFFSEASON
    sub_phase: STAFF_ASSEMBLY
    notes: >
      January 25: Chuck Pagano agreed to become head coach.
      Former Baltimore Ravens defensive coordinator. Staff
      assembly begins — Bruce Arians named OC, Greg Manusky
      named DC.

  # ----------------------------------------------------------
  # STAFF ASSEMBLY / OFFSEASON PLANNING
  # ----------------------------------------------------------

  - id: staff_assembly
    label: Staff Assembly — February
    start: 2012-02-01
    end: 2012-02-21
    phase: OFFSEASON
    sub_phase: STAFF_RETENTION_AND_PLANNING
    notes: >
      Coaching staff finalized. Roster evaluation begins in
      earnest. The Manning decision looms — keep or release.
      Draft board construction begins. Scheme installation
      planning for a full philosophical overhaul (3-4 defense,
      Air Coryell offense).

  # ----------------------------------------------------------
  # NFL COMBINE
  # ----------------------------------------------------------

  - id: combine_01
    label: NFL Scouting Combine
    start: 2012-02-22
    end: 2012-02-28
    phase: COMBINE
    sub_phase: PROSPECT_EVALUATION
    notes: >
      Combine held at Lucas Oil Stadium, Indianapolis — the
      Colts' home stadium. Colts hold the #1 overall pick.
      Andrew Luck and Robert Griffin III are the marquee
      quarterback prospects.

  # ----------------------------------------------------------
