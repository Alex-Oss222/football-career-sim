# ============================================================
# 2012 INDIANAPOLIS COLTS — SEASON CALENDAR
# ============================================================
# World-state support file for coaching simulation engine.
# NOT a narrative file. This is the source of truth for
# time progression, turn anchoring, and compression support.
#
# IMPORTANT: This file contains NO results, NO scores, NO
# draft selections (player names), NO win/loss records. Those
# are determined by the simulation engine during play. This
# file provides ONLY the structural skeleton of the season —
# dates, opponents, locations, draft pick slots, and phase
# labels.
#
# PRIOR SEASON NOTE: The 2011 Colts went 2-14 in real
# history, earning the #1 overall pick in the 2012 NFL Draft.
# Peyton Manning was released. Jim Caldwell was fired.
# Chuck Pagano was hired as head coach on January 25, 2012.
# Ryan Grigson was hired as GM on January 11, 2012.
#
# GAME WEEK STRUCTURE:
#   start / end  = the full work-week window around the game
#   game_date    = the actual day the game is played
#   The engine uses start/end for the turn boundary and
#   game_date to know when the game itself falls.
#
# Place in: teams/indianapolis_colts/indianapolis_colts_calendar_2012.yaml
# ============================================================

meta:
  team: Indianapolis Colts
  season: 2012
  level: NFL
  stadium: Lucas Oil Stadium
  training_camp: Anderson University, Anderson, Indiana
  head_coach: Chuck Pagano
  interim_head_coach: Bruce Arians (Weeks 5-16, while Pagano treated for leukemia)
  offensive_coordinator: Bruce Arians
  defensive_coordinator: Greg Manusky
  special_teams_coordinator: Marwan Maalouf
  notable_assistants:
    - name: Clyde Christensen
      role: Quarterbacks
    - name: Harold Goodwin
      role: Offensive Line
    - name: James Bettcher
      role: Outside Linebackers
  general_manager: Ryan Grigson
  owner: Jim Irsay
  prior_season_record: 2-14
  prior_season_record_note: >
    Worst record in the NFL in 2011. Peyton Manning missed
    the entire season due to neck surgeries. Resulted in the
    #1 overall pick. Jim Caldwell fired as HC on January 17,
    2012. Bill Polian and Chris Polian fired January 2, 2012.
  division: AFC South
  draft_position: 1st overall (#1)
  offensive_scheme: Air Coryell
  defensive_alignment: 3-4
  points_for: null
  points_against: null
  final_record: null
  division_finish: null
  playoffs: null

