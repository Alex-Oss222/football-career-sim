  # ----------------------------------------------------------

  - id: manning_release
    label: Peyton Manning Released / Free Agency Planning
    start: 2012-03-01
    end: 2012-03-12
    phase: FREE_AGENCY
    sub_phase: PRE_FREE_AGENCY
    notes: >
      March 7: Peyton Manning officially released after 14
      seasons. $28M roster bonus avoided. One of the most
      consequential roster moves in NFL history. Free agency
      preparation intensifies.

  - id: fa_opens
    label: Free Agency Opens
    start: 2012-03-13
    end: 2012-03-24
    phase: FREE_AGENCY
    sub_phase: UFA_SIGNING_PERIOD
    notes: >
      March 13: 2012 NFL League Year and free agency begin.
      Colts undergo massive roster turnover — Dallas Clark,
      Jeff Saturday, Pierre Garcon, Jacob Tamme, Joseph Addai
      among key departures. Signings include Cory Redding,
      Samson Satele, Donnie Avery, Tom Zbikowski, Mike McGlynn.

