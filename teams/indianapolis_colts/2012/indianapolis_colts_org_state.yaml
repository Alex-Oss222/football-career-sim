# OWNERSHIP

ownership:
  owner: Jim Irsay
  title: Owner and CEO
  age: 52
  tenure: Owner since 1997 (inherited from father Robert Irsay)
  irsay_profile:
    background: >
      Inherited the Colts from his father Robert Irsay, who controversially moved
      the franchise from Baltimore to Indianapolis in 1984. Jim became majority owner
      in 1997. Presided over the Peyton Manning era — the most successful period in
      franchise history. Deeply emotional, publicly passionate, and heavily involved
      in football operations. Known for social media presence (Twitter). Has stated
      willingness to spend whatever is necessary to win.
    management_style: >
      Hands-on. Emotional. Makes public statements that sometimes create headlines.
      Capable of bold, decisive action (firing the Polians). Wants to feel connected
      to the football operation — expects regular communication from the HC and GM.
      Not content to be a silent owner. Values loyalty and emotional connection.
    what_irsay_wants_in_hc:
      - "Someone who can develop Andrew Luck into a franchise QB"
      - "A strong leader who can rebuild the culture post-Manning"
      - "A teacher and developer — not just a game-day tactician"
      - "Someone who can handle the Manning transition respectfully"
      - "An HC who communicates openly and keeps Irsay informed"
      - "A winner — Irsay has tasted winning and wants it back"
    what_irsay_fears:
      - "Hiring the wrong guy and wasting the Luck opportunity"
      - "A Manning-like departure becoming ugly or damaging"
      - "Years of losing eroding the franchise's standing in the league"
      - "Public perception that the organization has lost its way"
    risk_factors:
      - Emotional volatility in public statements
      - High expectations from a decade of winning
      - May not be fully patient with a rebuild timeline
      - Personal issues (substance abuse history has surfaced in media)

