# MAJOR ORG PRESSURE POINTS

pressure_points:
  - id: manning_release
    description: >
      Peyton Manning must be released before March 8 ($28M bonus). This is the most
      emotionally charged personnel decision in franchise history. The HC must handle
      it with dignity, respect, and decisiveness. Mishandling this creates a media
      firestorm and alienates the fanbase.
    severity: CRITICAL
    timeline: MARCH_2012

  - id: luck_development
    description: >
      Developing Andrew Luck is the HC's primary job. Everything else is secondary.
      If Luck develops, the franchise is set for a decade. If Luck is mishandled —
      poor scheme, inadequate protection, too much pressure too fast — the franchise
      loses a generational opportunity.
    severity: CRITICAL
    timeline: FULL_2012_AND_BEYOND

  - id: defensive_rebuild
    description: >
      The defense was 28th in points allowed in 2011. Freeney and Mathis are aging.
      The secondary is thin. The defensive roster needs a comprehensive rebuild through
      draft and free agency over 2-3 years. The HC's DC hire is the most important
      staff decision.
    severity: HIGH
    timeline: MULTI_YEAR

  - id: irsay_management
    description: >
      Irsay is emotionally invested, publicly opinionated, and accustomed to winning.
      Managing the owner relationship requires transparency, confidence, and the
      ability to educate without condescending. Losing Irsay's confidence is career-ending.
    severity: HIGH
    timeline: ONGOING

  - id: manning_shadow
    description: >
      Every decision, every loss, every Luck mistake will be compared to the Manning era.
      The media and fanbase will make this comparison constantly. The HC must have the
      psychological resilience to operate under this shadow without being defined by it.
    severity: MODERATE
    timeline: YEARS_1_THROUGH_3

  - id: gm_alignment
    description: >
      Both the HC and GM are new. They must build alignment on roster construction,
      draft philosophy, and free agency strategy from scratch. Early misalignment
      creates friction that compounds over time.
    severity: MODERATE
    timeline: IMMEDIATE

---

# OFFSEASON OPERATIONAL PRIORITIES

offseason_priorities:
  - priority: Hire Head Coach
    detail: >
      Grigson is now GM. The HC hire is the next critical decision. Grigson and Irsay
      are both involved in the search. The hire will define the post-Manning era.
  - priority: Build coaching staff
    detail: >
      Once HC is hired, he must build an entire staff. OC and DC hires are most
      critical. The OC must design a Luck-centric offense. The DC must begin the
      defensive rebuild. Staff must be assembled by late February.
  - priority: Navigate Manning release
    detail: >
      Manning must be released before March 8 bonus deadline. The HC must be part
      of the transition — publicly respectful, privately decisive. The handling of
      Manning's departure sets the tone for the new era.
  - priority: Draft Andrew Luck
    detail: >
      #1 overall pick. Luck is the consensus selection. The HC must be prepared to
      develop Luck from Day 1.
  - priority: Address defensive roster
    detail: >
      Use free agency and remaining draft picks to begin defensive rebuild. Priority
      areas: secondary, linebacker depth, and young edge rushers to complement/replace
      aging Freeney and Mathis.
  - priority: Offensive line improvement
    detail: >
      Luck must be protected. Interior OL needs investment. Castonzo at LT is the
      foundation — build around him.

