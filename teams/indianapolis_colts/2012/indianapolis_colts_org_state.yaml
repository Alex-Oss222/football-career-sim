# RECORD & EXPECTATIONS

record:
  previous_season: 2-14
  previous_season_context: >
    Worst record in Colts' Indianapolis era. Started 0-13. Won 2 of final 3 games
    (under backup QB Dan Orlovsky). Peyton Manning missed entire season with neck
    surgery. The 2-14 record exposed the roster as Manning-dependent — without him,
    the team had no competitive identity. SRS of -11.29 (dead last in NFL).
  previous_decade_context: >
    2000-2010: The Manning Decade. 115-45 regular season record. Nine consecutive
    playoff appearances (2002-2010). Two Super Bowl appearances (won XLI in 2006,
    lost XLIV in 2009). The most successful era in franchise history. All of it
    built around Peyton Manning.
  year_1_hc_expectation_band: 4-12 to 8-8
  year_1_evaluation_criteria: luck_development_and_process
  patience_level: MODERATE_TO_HIGH
  patience_notes: >
    Irsay understands a rebuild is necessary. He fired the Polians and Caldwell,
    which signals willingness to start over. But Irsay is emotionally invested and
    has experienced winning for a decade. His patience has limits. The HC gets a
    Year 1 grace period but must show tangible progress. If Year 2 does not show
    significant improvement, the seat warms quickly. Irsay is capable of decisive
    action (he fired the Polians one day after the season ended).
  playoff_expectation_year_1: NONE
  playoff_expectation_year_2: REALISTIC_HOPE

