# GM STATUS

gm:
  name: Ryan Grigson
  title: General Manager
  hired: 2012-01-11
  previous_role: VP of Player Personnel, Philadelphia Eagles (2004-2011)
  background: >
    Former offensive lineman at Purdue. Entered NFL scouting with the St. Louis Rams
    (1999-2003). Joined the Philadelphia Eagles in 2004 as a scout. Rose through the
    Eagles' personnel department to VP of Player Personnel. First GM job. His scouting
    philosophy was shaped by the Eagles' organization under Andy Reid and Tom Heckert/
    Howie Roseman.
  eagles_connection_to_stone: >
    Grigson joined the Eagles in 2004. Stone was on the Eagles coaching staff from
    1999-2004 (QC 1999-2001, TE coach 2002-2004). Grigson and Stone overlapped in
    the Eagles organization for at least one year (2004). The exact nature of their
    interaction is unknown — coaching staff and scouting department operate in adjacent
    but separate worlds. However, shared Eagles organizational experience provides
    common reference points, shared language, and mutual acquaintances.
  grigson_priorities:
    - "Draft Andrew Luck #1 overall"
    - "Navigate the Manning release"
    - "Begin defensive roster rebuild through draft and free agency"
    - "Hire an HC who can develop Luck and rebuild the program"
    - "Establish credibility as a first-time GM"
  grigson_strengths:
    - Deep scouting experience across two organizations
    - Understanding of roster construction from the Eagles' model
    - Fresh perspective — not tied to the Polian era
  grigson_weaknesses:
    - First-time GM with no proven track record
    - Must learn to manage cap, contracts, and organizational politics simultaneously
    - Will be evaluated immediately — the Manning release and Luck draft are high-stakes decisions

