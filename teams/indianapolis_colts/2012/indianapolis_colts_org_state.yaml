# QB SITUATION

quarterback:
  franchise_qb_departing: Peyton Manning
  manning_status: >
    Will almost certainly be released before March 8, 2012 ($28M bonus deadline).
    Manning has had multiple neck surgeries. His ability to play at an elite level
    is uncertain. At 36, even if healthy, his window is limited. The Colts cannot
    justify paying $28M to a QB with an uncertain medical outlook when Andrew Luck
    is available at #1. The Manning release will be one of the most significant
    personnel decisions in NFL history.
  incoming_franchise_qb: Andrew Luck (projected #1 overall pick)
  luck_profile: >
    Stanford QB. 6'4", 235 lbs. Consensus #1 prospect. Considered the best QB
    prospect since Peyton Manning (or John Elway). Elite football intelligence,
    arm talent, mobility, toughness, and leadership. Pro-ready by college standards
    but still a rookie who must learn NFL speed, complexity, and physicality. The
    HC who develops Luck inherits the most valuable asset in the NFL — a generational
    QB on a rookie contract.
  backup_options: Curtis Painter (not viable), Dan Orlovsky (journeyman, 2-3 as starter in 2011)
  year_1_qb_priorities:
    - "Draft Andrew Luck #1 overall"
    - "Release Manning respectfully and decisively before bonus deadline"
    - "Design an offensive system tailored to Luck's strengths"
    - "Protect Luck — OL improvement is critical"
    - "Balance winning now against long-term QB development"
    - "Manage expectations — Luck is not Manning on Day 1"

