  - turn: 157
    date_range: 2012-10-22 to 2012-10-28
    team: Jacksonville Jaguars
    role: Head Coach
    phase: Regular Season — 2012 Week 7 Completed
    summary: Fresh off a bye, Stone’s Jaguars travelled to Oakland and delivered a 27–14 road win by executing a flexible, coverage‑driven game plan.  Stone opened in 11 personnel and used motion and trips formations to force the Raiders to declare coverages.  Kirk Cousins played like a point guard, distributing the ball to T.Y. Hilton on a post‑corner, Laurent Robinson on digs and comebacks, Mike Thomas underneath and Marcedes Lewis on crossers and seams.  When Oakland loaded the box, Stone called access throws and intermediate control concepts; when the Raiders sat in two‑high shells, Maurice Jones‑Drew and Alfred Morris punished them with inside and outside zone runs and counter.  Screens, bubbles, boots and pocket movement neutralised pressure.  Defensively Todd Bowles’s unit stopped Darren McFadden, set edges with Jeremy Mincey and Olivier Vernon, mixed zone and press‑man looks to confuse Carson Palmer, and capitalised on a Josh Norman interception.  Special teams flipped field position thanks to Johnny Hekker and Hilton’s returns.  The win improved Jacksonville to 4–2 and reinforced Stone’s belief in adapting to defensive looks rather than chasing balance.
    results:
    - Began the game with a five‑play diagnostic sequence (inside zone, spacing concept, RPO bubble, drive concept and outside zone) to gauge Oakland’s coverage and front alignment.
    - Featured Kirk Cousins distributing quick throws, digs, comebacks and crossers to multiple targets while moving the pocket with boots and screens to counter pressure.
