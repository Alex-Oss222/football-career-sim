  resume_anchor:
    exact_pickup_date: '2012-09-24'
    reason: >-
      On September 23 the Jaguars travelled to Lucas Oil Stadium for their first road divisional test against Indianapolis and started rookie quarterback Kirk Cousins.  Stone emphasised an aggressive, adaptable plan built around quick passes, formation variety and selective runs rather than a stubborn ground attack.  Cousins opened hot, completing rhythm throws to Braylon Edwards and Cecil Shorts and hitting T.Y. Hilton on a deep cross for a first‑quarter touchdown.  Maurice Jones‑Drew and Alfred Morris contributed on draws and misdirection, but the offense leaned on play‑action and intermediate concepts.  Defensively, Luke Kuechly and Bobby Wagner contained Andrew Luck and forced an interception, while the pass rush generated consistent pressure.  Despite a second‑half surge from Luck to Reggie Wayne, Stone’s offense answered with a clutch fourth‑quarter drive capped by a Marcedes Lewis red‑zone catch.  The Jaguars secured a 28–21 road win to move to 2–1 and head into Week 4 with renewed momentum and confidence in Cousins’s command of the offense.
