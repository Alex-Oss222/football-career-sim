    status: Stone is no longer merely ready for an OC role. He has already proven he can run an NFL offense. His philosophy integrates WCO timing concepts with Coryell vertical aggression, then adapts those ideas to roster reality. The Arizona turnaround sharpened his confidence, sequencing, and in-season adjustment process.
  what_he_brings_to_a_hc_interview:
  - A coherent offensive philosophy blending two major NFL offensive trees
  - Five years of live play-calling experience across college and the NFL
  - Two full years of NFL offensive coordinator proof on a normal roster
  - Understanding of both sides of the ball
  - HOF-caliber player credibility with current NFL players
  - Program-building experience that translates to culture-setting
  - A visible turnaround story: Arizona started 1-6 in 2011 and finished 8-1
  - Deep references from Reid, Dowhower, Turner, Whisenhunt, and the Chargers/Eagles trees
active_consequences: |-
  - Stone is past the "can he become an OC" stage of his career. The next decision is whether the right HC opportunity exists, not whether he can run an offense.
  - His résumé is still uniquely broad, which remains a strength and a risk — some owners will see a future head coach, while some offensive purists may still want a narrower specialist.
  - The Arizona turnaround gave him real late-season credibility, but the lack of a playoff berth keeps his profile just below the obvious top tier.
  - His financial cushion means he can be selective rather than desperate.
  - The 2012 interview cycle will determine whether his path accelerates toward NFL head coaching or stays on the OC track another few years.
  - Stone submitted head‑coaching applications to Jacksonville, Indianapolis, and Miami. The Jaguars responded by scheduling a phone interview, the Colts placed him on a waitlist, and the Dolphins declined. This reduced his active applications from three to two and signaled that the market was narrowing.
  - He completed the Jacksonville phone interview on January 15. He delivered detailed, evidence-backed responses about building a sustainable culture, installing a multiple offense tailored to Maurice Jones‑Drew and Marcedes Lewis, and developing Blaine Gabbert while considering the draft. His answers were scored 9/10, 9/10, and 8/10. Combined with his high communication-equivalent skill rating (12.75 points), his phone interview total of 38.75 exceeded the 35-point threshold and advanced him to a campus interview. Jacksonville immediately scheduled the next stage. Stone prepared his itinerary, drafted questions for owner Shad Khan and GM Gene Smith, and began outlining his 100-day plan. Indianapolis remains a waitlist possibility; Miami is closed.
  - He traveled to Jacksonville for the campus interview. Over five stages, he met with owner Shad Khan and GM Gene Smith to present his three-year vision, met the current staff to discuss evaluations and hires, spoke with players about culture and continuity, delivered a detailed 100‑day operational and scheme presentation tailored to Maurice Jones‑Drew, Marcedes Lewis, and the Jaguars roster, and answered rapid-fire panel questions about his candidacy, weaknesses, and queries for the organization. His stage scores (9/10, 9/10, 9/10, 9/10, 8/10) combined with his relevant skills average (85 × 0.5 = 42.5) produced a total of 86.5. This score placed him in the finalist category and advanced him to the final interview round. Jacksonville scheduled the final interview. Indianapolis remains a waitlist possibility; Miami is closed.
  - In the final interview, Stone sat for an extended dinner and conversation with owner Shad Khan and general manager Gene Smith. He delivered a succinct, 100‑plus‑word final statement that synthesised his Hall of Fame credibility, dual‑system offensive philosophy, program‑building experience, and commitment to hiring a seasoned defensive coordinator. He candidly acknowledged his lack of prior NFL head‑coaching experience, explained how he would rely on his staff to fill gaps, and asked pointed questions about organizational alignment, draft control, and resource allocation. Khan conducted reference calls with Andy Reid, Rod Dowhower, and Ken Whisenhunt, each of whom offered glowing endorsements of Stone’s leadership, adaptability, and honesty. The reference check added fifteen points to his dossier, a fit bonus of five points reflected the perfect match between his scheme and Jacksonville’s roster【366879180517951†L378-L410】, and a fourteen‑point final statement score propelled his total to 120.5. This outpaced other finalists such as Mike Mularkey and Dirk Koetter and persuaded Khan to offer Stone the head‑coaching position. Negotiations now begin while Indianapolis remains on the waitlist and Miami is closed.
  - Between March 1 and April 26, Stone, Gene Smith, Shad Khan, the coaching staff and the finance department executed a series of disciplined roster moves that balanced immediate needs with long‑term flexibility.  They traded away Paul Posluszny for mid‑round draft capital while retaining Daryl Smith, dealt Luke McCown for a future pick, and cut eight veterans to free cap space.  In free agency they signed right tackle Eric Winston to a below‑market four‑year deal【900258649864444†L325-L329】, added veteran pass rushers Andre Carter and John Abraham, re‑signed Jeremy Mincey, and signed Braylon Edwards, Chad Henne and Reggie Nelson.  These moves aligned with the foundation‑first philosophy by strengthening the trenches, adding depth and preserving cap flexibility.  The staff also prepared a targeted undrafted free agent class headlined by punter Johnny Hekker and safety Tashaun Gipson.  As a result, Jacksonville entered the draft with a stable roster, additional picks and increased organisational confidence.
  - Following the offer, Stone and his agent entered negotiations with Shad Khan. They aimed for a contract in the $13–14 million range over four years with the first two years guaranteed and clauses ensuring control over staff hires. Khan’s opening offer mirrored the Greg Schiano baseline at roughly $12 million. Stone countered with $14 million and guaranteed coordinator authority. The parties agreed on a four‑year, $13.6 million deal with $6.8 million guaranteed in years one and two and performance escalators in years three and four based on win totals and playoff berths. Coordinator hiring input and final say over staff were guaranteed. Accepting the deal officially made Stone the head coach of the Jacksonville Jaguars, ended his application with Indianapolis, and triggered the transition into staff hiring and roster evaluation.
  - Over the next two weeks Stone built his coaching staff.  He targeted a mix of veteran teachers and rising coordinators, interviewing Doug Pederson, Matt LaFleur, Chris Foerster, Eric Bieniemy, Ike Hilliard, Freddie Kitchens, Luke Getsy, Todd Bowles, Andre Patterson, Matt Eberflus, Ed Donatell and Rich Bisaccia.  Top targets like Aaron Kromer, Bill Callahan, Pep Hamilton and Vic Fangio declined due to existing commitments or preferred roles.  After negotiating contracts within typical 2012 salary ranges, he hired Pederson (3 years, $1.9M), LaFleur (2 years, $0.5M), Foerster (3 years, $0.85M), Bieniemy (2 years, $0.45M), Hilliard (2 years, $0.45M), Kitchens (2 years, $0.4M), Getsy (2 years, $0.3M), Bowles (3 years, $2.1M), Patterson (2 years, $0.5M), Eberflus (2 years, $0.5M), Donatell (2 years, $0.55M) and Bisaccia (3 years, $0.75M).  The staff met on January 29 to align on culture, scheme and operations, then were introduced to the media on February 1.  Stone now moves to roster evaluation and free agency planning with a fully built staff.
  - Between February 7 and February 21, Stone convened a series of intensive meetings with his coaching staff, general manager Gene Smith, owner Shad Khan, the scouting department and the club’s finance team.  The group debated the initial free‑agency proposal and draft board that had prioritised a No. 1 receiver and quick offensive jump.  While they recognised that upgrading the passing game was important, they agreed that paying premium prices for a receiver like Vincent Jackson would misalign with Stone’s builder mandate and eat cap space needed elsewhere.  They acknowledged the market context: top free agents such as guard Carl Nicks and defensive end Mario Williams would command record‑setting contracts【372985519218166†L211-L217】【372985519218166†L241-L252】, and wide receiver Vincent Jackson’s combination of size, speed and contested‑catch ability came at a premium【372985519218166†L267-L276】.  Instead, they shifted toward a foundation‑first philosophy, investing in the offensive line with targets like Ben Grubbs【372985519218166†L337-L343】, re‑signing Jeremy Mincey rather than chasing splashy edge rushers, and seeking a reliable veteran receiver such as Reggie Wayne while using the draft to land their long‑term No. 1 in Justin Blackmon.  The meetings also finalised offensive and defensive schemes, set cultural standards and expectations, and confirmed that the draft board would operate under the “swap” rule—whoever Jacksonville selects is swapped with that player’s historical slot, keeping draft history intact.  By February 21, consensus was reached on the foundation‑first plan, leaving the organisation aligned and ready for the scouting combine.
  - From February 22 through February 28 Stone and his staff attended the NFL scouting combine and evaluated their targeted prospects.  They confirmed Luke Kuechly’s elite range with a 4.58‑second 40‑yard dash, 38‑inch vertical and 11.43‑second 60‑yard shuttle【459036554289166†L97-L104】, and validated Bobby Wagner’s sideline‑to‑sideline speed via his pro‑day 4.45‑second 40 and 39.5‑inch vertical【600181430595093†L165-L173】.  They were impressed by T.Y. Hilton’s 4.34‑second 40 and game‑breaking quickness【777471514394376†L417-L423】.  Mid‑round debates weighed Olivier Vernon’s explosive 4.73‑second 40 and 34.5‑inch vertical【881419948871879†L1045-L1047】 against the power of Brandon Brooks【968355876953202†L101-L110】, Akiem Hicks【600181430595093†L1398-L1407】 and Ben Jones【881419948871879†L699-L700】.  Ultimately the Jaguars finalised their draft board with Kuechly, Wagner, Hilton, Vernon, Kirk Cousins, Josh Norman, Alfred Morris and Scott Solomon.  This combine evaluation phase reinforced internal alignment on the foundation‑first strategy and strengthened Shad Khan’s confidence in Stone’s roster vision.
  - Over the three‑day 2012 NFL draft Stone executed the foundation‑first plan.  He used pick 5 on Luke Kuechly, pick 38 on Bobby Wagner, pick 70 on T.Y. Hilton, traded up for Olivier Vernon using picks 115 and 180, selected Kirk Cousins at 101, Josh Norman at 142, traded up to secure Alfred Morris in the sixth round and finished with Scott Solomon at 214.  In accordance with the swap rule, Justin Blackmon went to Carolina, Andre Branch to Seattle, punter Bryan Anger to Indianapolis, linebacker Brandon Marshall to Carolina and defensive back Mike Harris to Washington.  The class added cornerstone players at linebacker, edge, receiver, quarterback, corner and running back while preserving cap flexibility.  Shad Khan and Gene Smith praised the disciplined draft and increased their confidence in Stone’s long‑term vision.
  - In the weeks following the draft Stone signed a priority UDFA class (Johnny Hekker, Tashaun Gipson, Michael Thomas, Chase Minnifield, Kevin Elliott, Antonio Allen, Derek Moye and George Bryan) and ran rookie orientation and minicamp.  These moves deepened the roster at minimal cost and reinforced the foundation‑first philosophy.
  - From May through August he led OTAs, minicamp and a demanding training camp.  Stone installed his dual‑system offense and Todd Bowles’s defense, enforced conditioning standards and accountability, and evaluated players across four preseason games.  He finalised a 53‑man roster on September 1, retaining Blaine Gabbert with backups Chad Henne and Kirk Cousins, pairing Maurice Jones‑Drew with rookie Alfred Morris, and assembling a balanced defense anchored by Luke Kuechly and Bobby Wagner.  The Jaguars exited camp with a clear identity and cautious optimism for the regular season.
  - After a 23–17 opening win over Minnesota, Stone’s Jaguars began the 2012 season 1–0.  The disciplined, run‑first game plan validated his foundation‑first philosophy and slightly increased his job security.  The team now turns its focus to a Week 2 home game against the Houston Texans.
  - The Week 2 home loss to Houston dropped the Jaguars to 1–1.  Despite sticking to a balanced, run‑heavy script and forcing Houston to earn its yards, Jacksonville’s offense struggled to generate explosives and surrendered a critical strip‑sack.  The result underscored the need for improved pass protection and a more dynamic passing attack while reaffirming Stone’s commitment to physical football.  Preparation shifts to a Week 3 road game at Indianapolis.
last_3_turns_summary:
  - 'Turn 151: In Week 1 of the 2012 regular season Jacksonville travelled to Minnesota and defeated the Vikings 23–17.  Stone’s play‑calling leaned on the run game with Maurice Jones‑Drew and Alfred Morris, used quick passes to Braylon Edwards and Cecil Shorts, and picked timely play‑action shots to T.Y. Hilton.  The defense, led by Luke Kuechly and Bobby Wagner, forced two turnovers and contained Adrian Peterson.  The win gave Stone a 1–0 start and validated his foundation‑first identity heading into Week 2.'
  - 'Turn 152: In Week 2 Jacksonville hosted Houston and suffered a 21–13 defeat.  Stone stuck to his run‑first script, mixing inside zone, power and stretch calls and using quick‑game passes, but Houston’s J.J. Watt stripped Blaine Gabbert in the fourth quarter to set up the decisive touchdown.  The defense limited Arian Foster but surrendered two scoring plays to Matt Schaub and Andre Johnson.  The Jaguars fell to 1–1 and refocused on pass protection and explosive plays for their Week 3 trip to Indianapolis.'
  - 'Turn 153: In Week 3 Jacksonville traveled to Indianapolis and defeated the Colts 28–21.  Making his first start, rookie quarterback Kirk Cousins executed an aggressive game plan built around quick passes, play‑action and formation diversity.  He connected with T.Y. Hilton for a deep touchdown and guided a balanced late drive culminating in a Marcedes Lewis score.  The defense intercepted Andrew Luck and generated steady pressure.  The victory improved the Jaguars to 2–1 and boosted confidence in the offense’s versatility heading into a Week 4 home game against Cincinnati.'
