  season_record:
    wins: 2
    losses: 1
  game_results:
    - week: 1
      date: '2012-09-09'
      opponent: Minnesota Vikings
      site: Mall of America Field, Minneapolis
      result: Win 23-17
      summary: >-
        Jacksonville executed a run-first game plan that controlled the ball, limited turnovers and created explosive play-action opportunities.  Maurice Jones‑Drew and Alfred Morris combined for over 150 rushing yards, while Blaine Gabbert completed high-percentage throws to Braylon Edwards and Cecil Shorts.  The defense, led by Luke Kuechly and Bobby Wagner, forced two turnovers and kept Adrian Peterson under 90 yards.  The special teams unit, keyed by punter Johnny Hekker and kicker Josh Scobee, won the field-position battle.  The victory opened the Stone era with a balanced, disciplined performance.

    - week: 2
      date: '2012-09-16'
      opponent: Houston Texans
      site: EverBank Field, Jacksonville
      result: Loss 13-21
      summary: >-
        Jacksonville stuck to its foundation‑first philosophy by opening with inside zone, duo and stretch runs and using quick-game passes to Braylon Edwards, Cecil Shorts and Marcedes Lewis.  Josh Scobee’s field goals kept the game close, but Houston’s defensive front, led by J.J. Watt and Brian Cushing, disrupted the run game and recorded a decisive strip‑sack in the fourth quarter.  The defense held Arian Foster under 100 yards and forced one turnover, yet Matt Schaub and Andre Johnson capitalised on coverage lapses for two touchdowns.  A final Jaguars drive stalled near midfield.  The 21–13 loss dropped Jacksonville to 1–1 but reinforced the need for improved pass protection and explosive plays.

    - week: 3
      date: '2012-09-23'
      opponent: Indianapolis Colts
      site: Lucas Oil Stadium, Indianapolis
      result: Win 28-21
      summary: >-
        With rookie quarterback Kirk Cousins making his first start, Stone abandoned a run‑first script in favour of tempo, formation diversity and intermediate passing.  Cousins executed quick‑game concepts to Braylon Edwards and Cecil Shorts and used play‑action to free T.Y. Hilton for a 40‑yard touchdown.  Maurice Jones‑Drew and Alfred Morris complemented the air attack with draws and misdirection runs to keep Indianapolis honest.  Jacksonville’s defense limited Andrew Luck with disciplined rush lanes and intercepted him once.  In the fourth quarter, with the score tied 21–21, Stone engineered a 12‑play drive featuring a balanced mix of bootlegs and option routes, culminating in a Marcedes Lewis touchdown catch.  The Jaguars sealed a 28–21 road win and improved to 2–1.

