meta:
  character: Alex Stone
  file_purpose: Persistent relationship tracking for coaching and career progression
  update_rule: >
    Update scores and statuses when a meaningful interaction, conflict, favor,
    trust gain, trust loss, authority change, or career-impacting moment occurs.
    Do not rewrite history; append major events to relationship_history.
  created: 1999-01-15
  last_updated: 1999-01-15

summary:
  current_team: None
  current_role: Unemployed Coach Candidate
  relationship_environment: Coaching Carousel
  notes:
    - No active team staff relationships yet
    - Initial relationships are baseline reputation, references, and target-job connections

scoring_system:
  scale:
    0_10: hostile_or_broken
    11_25: severe_distrust
    26_40: guarded_negative
    41_55: neutral_or_uncertain
    56_70: functional_positive
    71_85: trusted
    86_100: strong_bond
  trend_values:
    up: relationship improving
    flat: stable
    down: relationship deteriorating
  interaction_weight:
    minor: small update
    moderate: meaningful update
    major: large update
    career_altering: extreme update

