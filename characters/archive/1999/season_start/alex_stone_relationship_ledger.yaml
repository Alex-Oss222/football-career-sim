rules:
  valid_status_values:
    - prospective
    - distant_prospective
    - alternate_target
    - active
    - active_reference
    - inactive
    - strained
    - broken
    - mentor_active
    - supervisor_active
    - peer_active
    - rival_active

  valid_categories:
    - supervisor
    - head_coach
    - coordinator
    - position_coach
    - executive
    - owner
    - teammate
    - player
    - peer_staff
    - mentor
    - reference
    - media
    - rival
    - family
    - friend
    - agent
    - recruiter

  update_rules:
    score_change_guidelines:
      minor_positive: +1_to_+3
      moderate_positive: +4_to_+8
      major_positive: +9_to_+15
      minor_negative: -1_to_-3
      moderate_negative: -4_to_-8
      major_negative: -9_to_-15

    when_to_update: >
      Update a relationship when a direct interaction, clear trust movement,
      public/private conflict, favor, recommendation, promotion, criticism, or
      authority change meaningfully affects the relationship.

    when_not_to_update: >
      Do not update for normal background existence, routine weekly contact, or
      every conversation unless something actually shifted.

    write_rule: >
      When a relationship changes meaningfully:
        1. Update the active relationship entry
        2. Append one new item to relationship_history
        3. Update last_updated in meta

maintenance_instructions:
  start_of_new_job:
    - Update current_team in summary
    - Add or activate new supervisor and staff entries
    - Demote old job relationships from active to inactive or distant if needed

  promotion:
    - Update role_context for current staff relationships
    - Add new direct reports or new supervisor if role changes
    - Reclassify peers who now become subordinates or evaluators

  team_change:
    - Keep old relationships unless fully broken
    - Change old team staff to inactive, distant, or former colleague
    - Add new team staff as prospective or active depending on move

  firing_or_conflict:
    - Reduce relationship scores only if the firing/conflict clearly damages trust
    - Log the event in relationship_history
    - Update status to strained or broken if appropriate

  placeholders:
    - Replace placeholder references with real names when finalized
    - Remove optional personal entries that are not active in this continuity