active_relationships:

  - id: rel_0001
    name: Andy Reid
    category: head_coach
    team: Philadelphia Eagles
    role_context: Target Head Coach
    status: prospective
    relationship_score: 50
    trend: flat
    trust_level: uncertain
    influence_level: very_high
    reports_to_chain: none_yet
    current_dynamic: >
      Reid is the most important gatekeeper for Stone's preferred entry path.
      No personal relationship exists yet. Interest depends entirely on fit,
      humility, and interview impression.
    how_they_see_stone: >
      Potentially interesting non-traditional candidate: elite football mind,
      Hall of Fame playing credibility, zero coaching experience, unknown ego fit.
    how_stone_sees_them: >
      Best philosophical fit in the 1999 market. High-value developmental coach.
    opportunity: >
      If Stone proves he wants to teach and truly start at the beginning, Reid
      is one of the few coaches likely to consider him seriously.
    risk: >
      If Stone sounds entitled, overplays his playing career, or signals that QC
      work is beneath him, Reid will shut the door quickly.
    last_meaningful_event:
      date: 1999-01-15
      type: target_identified
      impact: moderate
      note: Reid selected as primary coaching target
    tags: [eagles, head_coach, target_job, reid_tree]

