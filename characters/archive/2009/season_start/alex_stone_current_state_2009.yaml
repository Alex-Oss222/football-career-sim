personal_development:
  system_familiarity:
    system: Turner Coryell vertical passing offense
    time_in_system_completed: None — first day as a coach in this system (though he played in it for 12 years)
    status: Stone played in the Coryell offense for his entire career. He knows the concepts as a player. Now he must learn to design, teach, and coordinate them as a coach — a fundamentally different skill set. The Reid WCO he spent six years coaching is timing-based and horizontal; Turner's Coryell descendant is vertical and aggressive. Learning both makes Stone's eventual OC playbook significantly more complete.
  what_hes_building:
  - Coryell vertical passing concepts — deep crossers, seam stretches, vertical option routes
  - Play-action design off a power run game (different from Reid's play-action off zone runs)
  - How an aggressive, risk-taking offense operates versus Reid's controlled WCO
  - Working under a coaching tree completely different from Reid's
  - Coordination-level NFL experience for a future OC candidacy
active_consequences:
- Stone returns to the NFL after four years away. The league has changed and he must re-acclimate to NFL speed, talent, and game-planning.
- He is coaching alongside Antonio Gates — a HOF-caliber TE — mirroring the kind of elite TE coaching opportunity he never had in Philadelphia.
- The Coryell vertical concepts are new to him as a coach. His player knowledge of the system gives him a head start but does not replace coaching knowledge.
- His college HC experience gives him credibility that a typical first-year coordinator would not have, but he is still new to the NFL coordinator role.
- The two-year deal gives him time to learn the system and prove his coordinator-level value.
