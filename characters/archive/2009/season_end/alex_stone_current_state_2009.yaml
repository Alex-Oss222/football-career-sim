  - Passing concept design and route distribution within Turner's Coryell framework
  - TE/WR route combination coordination and spacing
  - Third-down, red-zone, and two-minute passing packages
  - Bridge between Reid WCO timing concepts and Turner's vertical Coryell concepts
  - Direct work with Antonio Gates on route stems, leverage, and option-route detail
  what_he_learned:
  - Coryell vertical passing concepts — deep crossers, seam stretches, vertical option routes
  - Play-action design off a power run game versus Reid's play-action off zone runs
  - How Turner's aggressive, risk-taking offense operates versus Reid's controlled WCO
  - Turner's philosophy, meeting structure, game-plan process, and in-game adjustments
  - How elite NFL talent (Rivers, Gates, Jackson) operates within a vertical scheme
