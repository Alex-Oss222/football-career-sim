- turn: 36
  date_range: 2002-01-28 to 2002-02-05
  team: Philadelphia Eagles
  role: Tight Ends Coach
  phase: Offseason — Internal Promotion / 2002 Cycle Start
  summary: After the 2001 season, Rod Dowhower left the offensive coordinator role, Brad Childress was elevated to coordinator, Pat Shurmur moved from the TE room to quarterbacks, and Stone was promoted internally to tight ends coach. The promotion was not a pity award; it happened because a real Level 1 opening finally existed inside a staff that already trusted him and because his three-year QC evaluation had crossed from emerging to real.
  results:
  - Promoted internally from Offensive QC to Tight Ends Coach for the 2002 season.
  - Compensation reopened and the final year of his continuity deal was amended to position-coach money.
  - Inherited his first NFL room inside a system he already knew cold.
