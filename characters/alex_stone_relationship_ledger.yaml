    date: '2012-09-01'
    event: Stone led the Jaguars through OTAs, minicamp and a demanding training camp, installing his dual‑system offense and Todd Bowles’s defense, enforcing conditioning standards, and evaluating players across four preseason games.  The team finished 2–2 in the preseason, and Stone finalised a 53‑man roster with Blaine Gabbert as starter, Maurice Jones‑Drew and Alfred Morris as the running back duo, a revamped receiving corps, and a youthful defense anchored by Luke Kuechly and Bobby Wagner.
