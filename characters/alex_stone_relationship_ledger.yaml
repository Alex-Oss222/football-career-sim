   date: '2012-02-21'
   event: Stone convened roster‑evaluation meetings with his staff, GM Gene Smith, owner Shad Khan, scouts and finance officials to refine the offseason plan.  The group shifted from a win‑now offensive splash to a foundation‑first philosophy, agreeing to invest in the offensive line and secondary, re‑sign key veterans and pursue a moderate veteran receiver while using the draft to secure a long‑term No. 1 wideout.
   effects:
   - name: Shad Khan
     delta: 3
     note: Alignment on the foundation‑first philosophy strengthened Khan’s trust.
   - name: Gene Smith
     delta: 2
     note: Collaborative planning improved Smith’s confidence in Stone’s strategic vision.
 - turn: 146
   date: '2012-02-28'
   event: Stone and his staff attended the 2012 scouting combine in Indianapolis, evaluated targeted prospects and finalised the draft board with Luke Kuechly, Bobby Wagner, T.Y. Hilton, Olivier Vernon, Kirk Cousins, Josh Norman, Alfred Morris and Scott Solomon.  The thorough evaluation process demonstrated Stone’s commitment to the foundation‑first philosophy.
   effects:
   - name: Shad Khan
     delta: 2
     note: Khan’s confidence grew as he saw Stone’s meticulous approach to the combine and the thoughtful construction of the draft board.
   - name: Gene Smith
     delta: 2
     note: Smith’s trust increased due to the collaborative evaluation process and the balanced final board.

- turn: 147
  date: '2012-04-26'
  event: Stone, Gene Smith, Shad Khan and the finance team executed free‑agency signings, trades and roster cuts to set up the Jaguars for the draft.  They traded Paul Posluszny to the Chicago Bears for mid‑round picks, dealt Luke McCown for a future pick, cut several veterans to free cap space, signed right tackle Eric Winston, pass rushers Andre Carter and John Abraham, re‑signed Jeremy Mincey, added receiver Braylon Edwards, quarterback Chad Henne and safety Reggie Nelson, and prepared a targeted undrafted free agent class.  These disciplined moves aligned with the foundation‑first philosophy and bolstered confidence within the organisation.
  effects:
  - name: Shad Khan
    delta: 2
    note: Khan’s trust increased as he witnessed Stone manage free agency and trades prudently while strengthening the roster.
  - name: Gene Smith
    delta: 1
    note: Smith appreciated Stone’s balanced approach to roster construction, which reinforced their partnership.

 - turn: 148
   date: '2012-04-28'
   event: Stone and the Jaguars front office executed the 2012 NFL Draft.  They selected Luke Kuechly, Bobby Wagner, T.Y. Hilton, Kirk Cousins, Olivier Vernon, Josh Norman, Alfred Morris and Scott Solomon while adhering to the draft swap rule.  Each Jaguars selection resulted in the player originally chosen in that slot being reassigned to the new player’s historical team (Blackmon to Carolina, Branch to Seattle, Anger to Indianapolis, Brandon Marshall to Carolina, and Mike Harris to Washington).  The draft class added cornerstone talents on both sides of the ball and solidified the foundation‑first roster build.
